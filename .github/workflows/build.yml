name: Build OpenWrt (EA6350v3 + XModem)

on:
  workflow_dispatch:
    inputs:
      version:
        description: OpenWrt release tag to build
        default: v25.12.4
  push:
    branches: [main]
    paths:
      - ea6350v3.config
      - feeds.conf.append
      - files/**
      - .github/workflows/build.yml

env:
  TZ: Asia/Jakarta

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget

      - name: Clone OpenWrt
        run: |
          git clone --depth 1 -b "${{ github.event.inputs.version || 'v25.12.4' }}" \
            https://github.com/openwrt/openwrt.git openwrt

      - name: Add XModem feed and update/install
        run: |
          cd openwrt
          cat ../feeds.conf.append >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Generate .config
        run: |
          cp ea6350v3.config openwrt/.config
          cd openwrt
          make defconfig

      - name: Add custom files (uci-defaults)
        run: cp -r files openwrt/files

      - name: Download sources
        run: cd openwrt && make download -j8

      - name: Build firmware
        run: cd openwrt && make -j$(nproc) || make -j1 V=s

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-ea6350v3-XModem
          path: |
            openwrt/bin/targets/*/*/*-squashfs-factory.bin
            openwrt/bin/targets/*/*/*-squashfs-sysupgrade.bin
            openwrt/bin/targets/*/*/config.buildinfo
